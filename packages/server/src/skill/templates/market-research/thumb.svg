<svg viewBox="0 0 144 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Mock of the loop's dashboard: a calendar of dated reports beside the
       newest report. Colors ride the app's CSS variables. -->
