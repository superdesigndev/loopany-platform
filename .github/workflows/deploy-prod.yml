# Deploy Loopany to PRODUCTION — app "loopany-prod", https://loopany.ai.
#
# AUTO-PROMOTE-AFTER-STAGING: prod promotes automatically, but ONLY once the
# staging deploy (deploy.yml → loopany-testing) has finished SUCCESSFULLY for the
# same commit. The `workflow_run` trigger fires when "Deploy (Fly)" completes and
# the job `if:` gates on `conclusion == 'success'`, so a red staging deploy never
# reaches prod. Manual `workflow_dispatch` is always available for out-of-band
# promotes / retries, and the `production` GitHub Environment can still add
# required reviewers for a human gate on top of the staging gate.
#
# Why gated on staging (not push/tag directly): the single-scheduler invariant
# makes an accidental double-target dangerous, so prod is NEVER deployed straight
# off a raw push to main, NOR off a `v*` tag (that tag is publish-daemon.yml's
# npm-publish trigger — sharing it would deploy prod on every daemon release).
# Chaining off staging's success keeps the "observe on loopany-testing first"
# buffer while removing the manual step.
#
# Migrations apply on container boot: scripts/prestart.mjs runs the postgres-js
# migrator over the DIRECT Supabase URL (DIRECT_DATABASE_URL) whenever
# DATABASE_URL is set, so a bad migration fails the deploy before it serves.
name: Deploy Prod (Fly)

on:
  workflow_dispatch: {}
  workflow_run:
    # Auto-promote after the staging deploy workflow completes. The job `if:`
    # below requires conclusion == 'success', so a failed staging run is a no-op.
    workflows: ["Deploy (Fly)"]
    types: [completed]
    branches: [main]

# Distinct group from staging's `fly-deploy` so neither cancels the other's
# in-flight deploy. Never cancel a prod deploy mid-flight.
concurrency:
  group: fly-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: flyctl deploy → loopany-prod
    runs-on: ubuntu-latest
    # Add required reviewers to this GitHub Environment for a manual promote gate.
    environment: production
    # Auto-promote ONLY after a green staging deploy; manual dispatch always runs.
    # A failed/cancelled staging `workflow_run` is a silent no-op (never promotes).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    # On a workflow_run event `github.sha` is the default-branch HEAD, which can
    # drift past the commit staging actually built. Pin to the triggering run's
    # head_sha; fall back to github.sha for a manual dispatch (workflow_run null).
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      # Fail LOUD before flyctl if the prod token is empty. GitHub interpolates a
      # missing/rotted secret to the empty string (no error), which flyctl then
      # rejects with an opaque "no access token available" — this turns that silent
      # secret rot into an actionable failure at the very first step.
      - name: Preflight — require FLY_API_TOKEN_PROD
        env:
          FLY_API_TOKEN_PROD: ${{ secrets.FLY_API_TOKEN_PROD }}
        run: |
          if [ -z "$FLY_API_TOKEN_PROD" ]; then
            echo "::error::FLY_API_TOKEN_PROD is empty or unset — set the prod Fly token in repo secrets before deploying." >&2
            exit 1
          fi
      - uses: actions/checkout@v7
        with:
          # Build the exact commit staging validated, not whatever HEAD is now.
          ref: ${{ env.DEPLOY_SHA }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        # --ha=false: exactly ONE machine. Fly's default HA creates a second
        # machine, which would run a second in-process scheduler → double-fire.
        # GIT_SHA / BUILT_AT bake the pushed commit into the image so /api/health
        # can report it (smoke check below asserts it matches).
        run: |
          flyctl deploy --remote-only --ha=false -c fly.prod.toml -a loopany-prod \
            --build-arg GIT_SHA="$DEPLOY_SHA" \
            --build-arg BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        env:
          # Separate token from staging's FLY_API_TOKEN (set it in repo secrets).
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
      # Post-deploy smoke: prove the promoted image actually serves loopany.ai AND
      # is the commit we just pushed. A container that boots green but 500s, or a
      # promote that silently didn't take, fails the run here instead of passing.
      - name: Smoke — /api/health serves the pushed SHA
        run: |
          expected="$DEPLOY_SHA"
          got=''
          for attempt in 1 2 3 4 5; do
            if body="$(curl -fsS --max-time 15 https://loopany.ai/api/health)"; then
              echo "health: $body"
              got="$(printf '%s' "$body" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p')"
              [ "$got" = "$expected" ] && break
              echo "health served sha=$got, want $expected (attempt $attempt) — old container likely still draining, retrying in 10s…" >&2
            else
              echo "health not ready (attempt $attempt), retrying in 10s…" >&2
            fi
            sleep 10
          done
          if [ "$got" != "$expected" ]; then
            echo "::error::prod /api/health sha=$got but pushed sha=$expected — the deploy did not take (or /api/health never returned 2xx)." >&2
            exit 1
          fi
          echo "prod is serving $got ✔"
