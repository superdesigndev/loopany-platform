name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# pull_request_target runs with base-repo permissions and never checks out or
# executes PR code here — the action only reads PR metadata and comments.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event.issue.pull_request &&
        (contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA') ||
         github.event.comment.body == 'recheck'))
    steps:
      - name: CLA Assistant Lite
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla/signatures.json'
          path-to-document: 'https://github.com/superdesigndev/loopany-platform/blob/main/.github/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'stonexer,dependabot[bot],renovate[bot],*[bot]'
